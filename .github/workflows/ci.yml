name: CI
 
on:
  push:
    branches: ["main", "development"]
  pull_request:
    branches: ["main", "development"]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
 
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
 
      - name: Run lint
        run: pnpm lint
 
      - name: Run test
        run: pnpm test
 
      - name: Build project
        run: pnpm build